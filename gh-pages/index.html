<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IRA Workshop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px}
h1{font-size:32px;margin-bottom:12px;color:#1e293b}
h1 span{color:#f59e0b}
p{color:#6b7280;margin-bottom:32px;font-size:15px}
.links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px 32px;text-decoration:none;color:#1f2937;transition:.2s;min-width:200px}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-3px)}
.card .icon{font-size:36px;margin-bottom:8px}
.card .title{font-size:15px;font-weight:600}
.card .desc{font-size:12px;color:#6b7280;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <h1><span>IRA</span> Workshop</h1>
  <p>投研助手工作坊 · 数据看板</p>
  <div class="links">
    <a class="card" href="pr-dashboard.html">
      <div class="icon">📊</div>
      <div class="title">PR 提交统计</div>
      <div class="desc">查看小组和个人 PR 提交情况</div>
    </a>
    <a class="card" href="https://github.com/lvzhaobo/ira-workshop" target="_blank">
      <div class="icon">🐙</div>
      <div class="title">GitHub 仓库</div>
      <div class="desc">查看源代码仓库</div>
    </a>
  </div>
</div>
</body>
</html>
