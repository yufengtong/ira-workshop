# =============================================================
# Deploy PR Dashboard to GitHub Pages
# =============================================================
# 部署 PR 统计看板到 GitHub Pages
# 触发条件：
#   1. 推送到 main 分支且修改了 gh-pages 目录
#   2. 手动触发
# =============================================================

name: "Deploy PR Dashboard"

on:
  push:
    branches: [main]
    paths:
      - 'gh-pages/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gh-pages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
