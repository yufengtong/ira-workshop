<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票行情实时监控</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>股票行情实时监控</h1>
            <div class="header-info">
                <span class="update-time">最后更新: <span id="updateTime">--</span></span>
                <span class="market-status" id="marketStatus">加载中...</span>
                <span class="live-indicator" id="liveIndicator">实时</span>
            </div>
        </header>

        <!-- 主要内容区 -->
        <main class="main-content">
            <!-- 股票列表 -->
            <section class="stock-section">
                <div class="section-header">
                    <h2>涨幅榜 TOP 10</h2>
                    <span class="subtitle">沪深A股涨幅最大</span>
                </div>
                <div class="stock-list" id="stockList">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 行业列表 -->
            <section class="sector-section">
                <div class="section-header">
                    <h2>热门行业 TOP 5</h2>
                    <span class="subtitle">行业板块涨幅最大</span>
                </div>
                <div class="sector-list" id="sectorList">
                    <div class="loading">加载中...</div>
                </div>
            </section>
        </main>

        <!-- 底部 -->
        <footer class="footer">
            <div class="footer-left">
                <p class="data-source">数据来源: 东方财富</p>
                <p class="disclaimer">股市有风险，投资需谨慎</p>
            </div>
            <div class="footer-right">
                <button class="refresh-btn" id="refreshBtn">
                    <span class="refresh-icon">↻</span>
                    立即刷新
                </button>
                <label class="auto-refresh">
                    <input type="checkbox" id="autoRefresh" checked>
                    自动刷新(3秒)
                </label>
            </div>
        </footer>
    </div>

    <!-- 引入JavaScript文件 -->
    <script src="js/api.js"></script>
    <script src="js/stocks.js"></script>
    <script src="js/sectors.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
