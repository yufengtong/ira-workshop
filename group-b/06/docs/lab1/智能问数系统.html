<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能问数系统 - AI数据查询助手</title>
  <meta name="description" content="智能问数系统，通过自然语言查询数据，AI驱动的数据分析助手">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Design System Tokens ===== */
    :root {
      --bg-base: #f5f6fa;
      --bg-surface: #ffffff;
      --bg-elevated: #ffffff;
      --bg-chat: linear-gradient(180deg, #f5f6fa 0%, #eef0f8 100%);

      --text-primary: #1a1d2e;
      --text-secondary: #6b7194;
      --text-tertiary: #9da3c0;
      --text-inverse: #ffffff;

      --brand-500: #4f46e5;
      --brand-600: #4338ca;
      --brand-400: #6366f1;
      --brand-300: #818cf8;
      --brand-100: #e0e7ff;
      --brand-50: #eef2ff;

      --gradient-brand: linear-gradient(135deg, #4f46e5, #7c3aed, #a855f7);
      --gradient-header: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);

      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;

      --border-light: #e5e7f0;
      --border-focus: #4f46e5;

      --shadow-sm: 0 1px 2px rgba(26, 29, 46, 0.04);
      --shadow-md: 0 2px 8px rgba(26, 29, 46, 0.06), 0 1px 2px rgba(26, 29, 46, 0.04);
      --shadow-lg: 0 4px 16px rgba(26, 29, 46, 0.08), 0 2px 4px rgba(26, 29, 46, 0.04);
      --shadow-brand: 0 4px 14px rgba(79, 70, 229, 0.25);
      --shadow-glow: 0 0 24px rgba(99, 102, 241, 0.3);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;

      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== App Layout ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ===== Header ===== */
    .app-header {
      background: var(--gradient-header);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      color: var(--text-inverse);
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-inverse);
      letter-spacing: -0.01em;
    }

    .header-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }

    .header-right svg {
      width: 14px;
      height: 14px;
    }

    /* ===== Chat Area ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      background: var(--bg-chat);
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: var(--radius-full); }
    .chat-area::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* ===== Welcome Screen ===== */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 24px;
      animation: fadeIn 0.5s ease-out;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-xl);
      background: var(--gradient-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow-glow);
      animation: pulseRing 2.5s ease-in-out infinite;
    }

    .welcome-icon svg {
      width: 32px;
      height: 32px;
      color: var(--text-inverse);
    }

    .welcome h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .welcome p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
    }

    .suggestions {
      width: 100%;
      max-width: 480px;
    }

    .suggestions-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .suggestion-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      background: var(--bg-surface);
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition-smooth);
      text-align: left;
      margin-bottom: 8px;
      font-family: var(--font-sans);
    }

    .suggestion-btn:hover {
      border-color: var(--brand-300);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .suggestion-btn:active {
      transform: translateY(0);
    }

    .suggestion-btn .icon {
      width: 20px;
      height: 20px;
      color: var(--brand-400);
      flex-shrink: 0;
    }

    /* ===== Messages ===== */
    .messages {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideUp 0.4s ease-out;
    }

    .message-user {
      justify-content: flex-end;
      animation: fadeIn 0.3s ease-out;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message-avatar svg {
      width: 16px;
      height: 16px;
    }

    .avatar-bot {
      background: var(--gradient-header);
    }

    .avatar-bot svg { color: var(--text-inverse); }

    .avatar-user {
      background: var(--bg-base);
      border: 1px solid var(--border-light);
    }

    .avatar-user svg { color: var(--text-secondary); }

    .message-body {
      max-width: 85%;
    }

    .message-user .message-body {
      max-width: 75%;
    }

    .bubble-user {
      background: var(--gradient-brand);
      border-radius: var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg);
      padding: 14px 18px;
      color: var(--text-inverse);
      font-size: 14px;
      line-height: 1.6;
      box-shadow: var(--shadow-brand);
    }

    .bubble-bot {
      background: var(--bg-surface);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(229, 231, 240, 0.6);
    }

    .bubble-bot strong {
      color: var(--brand-500);
      font-weight: 600;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 6px;
      opacity: 0.7;
    }

    .message-user .message-time {
      text-align: right;
    }

    /* ===== Data Table ===== */
    .data-table-wrapper {
      margin-top: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      overflow: hidden;
      background: var(--bg-surface);
    }

    .data-table-scroll {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--brand-50);
      border-bottom: 1px solid var(--border-light);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .data-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(229, 231, 240, 0.5);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .data-table tbody tr {
      transition: var(--transition-smooth);
    }

    .data-table tbody tr:hover {
      background: var(--brand-50);
    }

    .cell-positive { color: var(--success); font-weight: 500; }
    .cell-negative { color: var(--danger); font-weight: 500; }
    .cell-number { color: var(--text-primary); font-weight: 500; }

    /* ===== Typing Indicator ===== */
    .typing {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn 0.3s ease-out;
    }

    .typing-bubble {
      background: var(--bg-surface);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 14px 20px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(229, 231, 240, 0.6);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .typing-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand-400);
    }

    .typing-dot:nth-child(1) { animation: typingDot 1.4s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation: typingDot 1.4s ease-in-out 0.2s infinite; }
    .typing-dot:nth-child(3) { animation: typingDot 1.4s ease-in-out 0.4s infinite; }

    /* ===== Input Area ===== */
    .input-area {
      border-top: 1px solid var(--border-light);
      background: var(--bg-surface);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .input-form {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      height: 44px;
      padding: 0 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      background: var(--bg-base);
      font-size: 14px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      transition: var(--transition-smooth);
      outline: none;
    }

    .input-field::placeholder {
      color: var(--text-tertiary);
    }

    .input-field:focus {
      border-color: var(--brand-400);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: var(--bg-surface);
    }

    .input-field:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--gradient-brand);
      color: var(--text-inverse);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
      flex-shrink: 0;
      box-shadow: var(--shadow-brand);
    }

    .send-btn:hover:not(:disabled) {
      box-shadow: var(--shadow-glow);
      transform: translateY(-1px);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* ===== Animations ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    @keyframes pulseRing {
      0% { transform: scale(0.96); box-shadow: 0 0 24px rgba(99, 102, 241, 0.3); }
      50% { transform: scale(1); box-shadow: 0 0 32px rgba(99, 102, 241, 0.45); }
      100% { transform: scale(0.96); box-shadow: 0 0 24px rgba(99, 102, 241, 0.3); }
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .app-header { padding: 12px 16px; }
      .header-right { display: none; }
      .welcome h2 { font-size: 20px; }
      .messages { padding: 16px 12px; }
      .message-body { max-width: 90% !important; }
      .bubble-bot, .bubble-user { padding: 12px 14px; }
      .data-table { font-size: 12px; }
      .data-table thead th, .data-table tbody td { padding: 8px 10px; }
    }
  </style>
</head>

<div id="app">
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-icon">

</div>

  content: '根据数据分析结果，以下是您查询的相关数据汇总。系统已从多个数据源中提取了最新信息，涵盖核心业务指标和趋势变化：',

// ===== App State =====
let messages = [];
let isTyping = false;

// ===== DOM =====
const chatArea = document.getElementById('chatArea');
const welcomeScreen = document.getElementById('welcomeScreen');
const messagesContainer = document.getElementById('messagesContainer');
const chatForm = document.getElementById('chatForm');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const suggestionList = document.getElementById('suggestionList');

// ===== Init =====
function init() {
  renderSuggestions();
  chatForm.addEventListener('submit', handleSubmit);
  chatInput.focus();
}

function renderSuggestions() {
  suggestionList.innerHTML = SUGGESTED_QUESTIONS.map(q => `
    <button type="button" class="suggestion-btn" onclick="handleSuggestionClick('${q.text}')">
      <span class="icon">${ICONS[q.icon]}</span>
      ${q.text}
    </button>
  `).join('');
}

// ===== Handlers =====
function handleSubmit(e) {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text || isTyping) return;
  sendMessage(text);
  chatInput.value = '';
}

function handleSuggestionClick(text) {
  if (isTyping) return;
  sendMessage(text);
}

function sendMessage(text) {
  // Hide welcome, show messages
  welcomeScreen.style.display = 'none';
  messagesContainer.style.display = 'flex';

  // Add user message
  addMessage('user', text);

  // Show typing
  isTyping = true;
  updateInputState();
  showTyping();

  // Simulate response delay
  const delay = 800 + Math.random() * 800;
  setTimeout(() => {
    hideTyping();
    const response = matchResponse(text);
    addMessage('bot', response.content, response.table);
    isTyping = false;
    updateInputState();
    chatInput.focus();
  }, delay);
}

function matchResponse(query) {
  for (const [keyword, response] of Object.entries(MOCK_RESPONSES)) {
    if (query.includes(keyword)) return response;
  }
  return DEFAULT_RESPONSE;
}

// ===== Rendering =====
function formatTime() {
  const now = new Date();
  return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(role, content, table) {
  const time = formatTime();
  const msgEl = document.createElement('div');
  msgEl.className = `message message-${role}`;

  if (role === 'user') {
    msgEl.innerHTML = `
      <div class="message-body">
        <div class="bubble-user">${escapeHtml(content)}</div>
        <div class="message-time">${time}</div>
      </div>
      <div class="message-avatar avatar-user">${ICONS.user}</div>
    `;
  } else {
    let tableHtml = '';
    if (table) {
      tableHtml = `
        <div class="data-table-wrapper">
          <div class="data-table-scroll">
            <table class="data-table">
              <thead><tr>${table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
              <tbody>${table.rows.map(row => `<tr>${row.map((cell, i) => `<td class="${getCellClass(cell, i)}">${cell}</td>`).join('')}</tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
      `;
    }
    msgEl.innerHTML = `
      <div class="message-avatar avatar-bot">${ICONS.bot}</div>
      <div class="message-body">
        <div class="bubble-bot">${content}${tableHtml}</div>
        <div class="message-time">${time}</div>
      </div>
    `;
  }

  messagesContainer.appendChild(msgEl);
  scrollToBottom();
}

function getCellClass(cell, colIndex) {
  if (typeof cell === 'string') {
    if (cell.startsWith('+')) return 'cell-positive';
    if (cell.startsWith('-') && cell.includes('%')) return 'cell-negative';
    if (cell === '预警') return 'cell-negative';
    if (cell === '达标' || cell === '正常') return 'cell-positive';
  }
  return '';
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typingIndicator';
  el.innerHTML = `
    <div class="message-avatar avatar-bot">${ICONS.bot}</div>
    <div class="typing-bubble">
      <span class="typing-text">分析中</span>
      <div class="typing-dots">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>
  `;
  messagesContainer.appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function updateInputState() {
  chatInput.disabled = isTyping;
  sendBtn.disabled = isTyping;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== Start =====
init();
</script>
