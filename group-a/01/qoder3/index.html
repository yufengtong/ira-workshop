  <style>
    /* ========== Design System Tokens ========== */
    :root {
      --bg-deep: #080b14;
      --bg-surface: #0d1121;
      --bg-card: #111728;
      --bg-card-hover: #161d33;
      --bg-elevated: #1a2240;

      --text-primary: #e8ecf4;
      --text-secondary: #8892a8;
      --text-muted: #5a6478;

      --accent-purple: #7c5cfc;
      --accent-purple-glow: #a78bfa;
      --accent-cyan: #22d3ee;
      --accent-cyan-glow: #67e8f9;
      --accent-orange: #fb923c;

      --border-subtle: rgba(138, 148, 178, 0.1);
      --border-active: rgba(124, 92, 252, 0.3);

      --gradient-hero: linear-gradient(135deg, rgba(124, 92, 252, 0.15), rgba(34, 211, 238, 0.08));
      --gradient-primary: linear-gradient(135deg, #7c5cfc, #a855f7);
      --gradient-card: linear-gradient(160deg, #111728, #0d1121);
      --gradient-card-hover: linear-gradient(160deg, #161d33, #111728);

      --shadow-card: 0 2px 16px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 8px 32px rgba(124, 92, 252, 0.15);
      --shadow-glow: 0 0 24px rgba(124, 92, 252, 0.25);

      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 100px;

      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;

      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========== Reset & Base ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* ========== Background ========== */
    .bg-mesh {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(124, 92, 252, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 25%, rgba(34, 211, 238, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.12;
      background-image:
        linear-gradient(rgba(138,148,178,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138,148,178,0.15) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .content-wrapper { position: relative; z-index: 1; }

    /* ========== Hero ========== */
    .hero { position: relative; padding: 48px 20px 32px; overflow: hidden; }
    .hero::before { content:''; position:absolute; inset:0; background:var(--gradient-hero); pointer-events:none; }
    .hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(to bottom,transparent,var(--bg-deep)); pointer-events:none; }

    .hero-badge {
      display:inline-flex; align-items:center; gap:6px; padding:5px 14px;
      border-radius:var(--radius-pill); font-size:12px; font-weight:500;
      background:rgba(124,92,252,0.12); border:1px solid rgba(124,92,252,0.2);
      color:var(--accent-purple-glow); margin-bottom:20px;
    }
    .hero-badge svg { width:14px; height:14px; }
    .hero-content { position:relative; z-index:1; text-align:center; }

    .hero h1 { font-size:32px; font-weight:800; letter-spacing:-0.5px; line-height:1.2; margin-bottom:12px; }
    .hero h1 .gradient-text {
      background:var(--gradient-primary); -webkit-background-clip:text;
      -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hero h1 .sub-title { display:block; font-size:24px; color:var(--text-primary); -webkit-text-fill-color:var(--text-primary); margin-top:4px; }

    .hero-desc { font-size:14px; color:var(--text-secondary); max-width:320px; margin:0 auto 28px; line-height:1.6; }

    .hero-stats { display:flex; justify-content:center; gap:32px; }
    .stat-item { text-align:center; }
    .stat-icon { display:inline-flex; align-items:center; gap:4px; color:var(--accent-purple); margin-bottom:2px; }
    .stat-icon svg { width:14px; height:14px; }
    .stat-value { font-size:20px; font-weight:700; color:var(--text-primary); }
    .stat-label { font-size:11px; color:var(--text-muted); margin-top:2px; }

    /* ========== Category Nav ========== */
    .category-nav {
      position:sticky; top:0; z-index:30;
      background:rgba(8,11,20,0.85); backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid var(--border-subtle); padding:12px 0;
    }
    .category-scroll {
      display:flex; gap:8px; padding:0 16px; overflow-x:auto;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .category-scroll::-webkit-scrollbar { display:none; }

    .cat-btn {
      flex-shrink:0; display:inline-flex; align-items:center; gap:5px;
      padding:6px 14px; border-radius:var(--radius-pill); border:none; outline:none;
      font-size:12px; font-weight:500; font-family:var(--font-sans); cursor:pointer;
      transition:var(--transition); background:var(--bg-elevated);
      color:var(--text-secondary); white-space:nowrap;
    }
    .cat-btn:active { transform:scale(0.96); }
    .cat-btn.active { background:var(--gradient-primary); color:#fff; box-shadow:var(--shadow-glow); }
    .cat-btn:not(.active):hover { background:var(--bg-card-hover); color:var(--text-primary); }

    /* ========== Search ========== */
    .search-wrapper { padding:12px 16px; }
    .search-box {
      display:flex; align-items:center; gap:8px; padding:10px 14px;
      border-radius:var(--radius); background:var(--bg-surface);
      border:1px solid var(--border-subtle); transition:var(--transition);
    }
    .search-box:focus-within { border-color:var(--border-active); box-shadow:0 0 0 3px rgba(124,92,252,0.08); }
    .search-box svg { width:16px; height:16px; color:var(--text-muted); flex-shrink:0; }
    .search-box input {
      flex:1; border:none; outline:none; background:transparent;
      font-size:14px; font-family:var(--font-sans); color:var(--text-primary);
    }
    .search-box input::placeholder { color:var(--text-muted); }
    .search-clear {
      flex-shrink:0; background:none; border:none; cursor:pointer;
      color:var(--text-muted); display:none; padding:2px;
    }
    .search-clear.visible { display:block; }
    .search-clear:hover { color:var(--text-primary); }

    /* ========== List ========== */
    .list-section { padding:4px 16px 24px; }
    .list-header { display:flex; align-items:center; justify-content:space-between; padding:8px 0 12px; }
    .list-count { font-size:12px; color:var(--text-muted); }
    .list-count strong { color:var(--text-primary); font-weight:600; }
    .cards-container { display:flex; flex-direction:column; gap:12px; }

    /* ========== Card ========== */
    .skill-card {
      display:block; border-radius:var(--radius); border:1px solid var(--border-subtle);
      background:var(--gradient-card); padding:16px; transition:var(--transition);
      box-shadow:var(--shadow-card); animation:slideUp 0.4s ease-out both;
    }
    .skill-card:hover, .skill-card:active {
      background:var(--gradient-card-hover); border-color:var(--border-active);
      box-shadow:var(--shadow-hover); transform:translateY(-1px);
    }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
    .card-top-left { display:flex; align-items:center; gap:8px; min-width:0; flex:1; }

    .card-rank {
      flex-shrink:0; width:24px; height:24px; border-radius:6px;
      background:var(--bg-elevated); display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700; color:var(--text-muted);
    }
    .card-rank.top3 { background:var(--gradient-primary); color:#fff; }

    .card-name {
      font-size:14px; font-weight:600; color:var(--text-primary);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:var(--transition);
    }
    .skill-card:hover .card-name { color:var(--accent-purple-glow); }

    .card-hot { flex-shrink:0; display:inline-flex; align-items:center; animation:pulse 2s ease-in-out infinite; }
    .card-hot svg { width:14px; height:14px; color:var(--accent-orange); }

    .card-link-icon { flex-shrink:0; color:var(--text-muted); transition:var(--transition); }
    .card-link-icon svg { width:14px; height:14px; }
    .skill-card:hover .card-link-icon { color:var(--accent-purple); }

    .card-fullname {
      font-size:11px; font-family:var(--font-mono); color:var(--text-muted);
      margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .card-desc {
      font-size:12px; color:var(--text-secondary); line-height:1.6; margin-bottom:12px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .card-footer { display:flex; align-items:center; justify-content:space-between; }
    .card-tags { display:flex; gap:6px; overflow:hidden; flex:1; margin-right:8px; }
    .card-tag {
      flex-shrink:0; padding:2px 8px; border-radius:4px; font-size:10px;
      font-weight:500; background:var(--bg-elevated); color:var(--text-muted);
    }
    .card-stars { flex-shrink:0; display:flex; align-items:center; gap:4px; }
    .card-stars svg { width:12px; height:12px; color:var(--accent-cyan); }
    .card-stars span { font-size:12px; font-weight:600; color:var(--accent-cyan); }

    /* ========== Empty ========== */
    .empty-state { text-align:center; padding:60px 20px; }
    .empty-state svg { width:48px; height:48px; color:var(--text-muted); opacity:0.4; margin-bottom:12px; }
    .empty-state p { font-size:14px; color:var(--text-muted); }

    /* ========== Footer ========== */
    .footer { border-top:1px solid var(--border-subtle); padding:24px 16px; margin-top:32px; text-align:center; }
    .footer p { font-size:12px; color:var(--text-muted); display:flex; align-items:center; justify-content:center; gap:4px; }
    .footer p svg { width:12px; height:12px; color:#ef4444; }
    .footer .footer-sub { font-size:10px; color:var(--text-muted); opacity:0.5; margin-top:4px; }

    /* ========== Back to Top ========== */
    .back-to-top {
      position:fixed; bottom:24px; right:16px; z-index:40; width:40px; height:40px;
      border-radius:50%; background:var(--gradient-primary); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:var(--shadow-glow); transition:var(--transition);
      opacity:0; transform:translateY(20px); pointer-events:none;
    }
    .back-to-top.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
    .back-to-top svg { width:20px; height:20px; color:#fff; }
    .back-to-top:active { transform:scale(0.9); }

    /* ========== Animations ========== */
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  </style>
</head>

      { name:"agent-skills.cc", desc:"按热度排序的 Claude Skills 发现平台，可按 Stars/Forks 浏览", cat:"tools", stars:"600", url:"https://agent-skills.cc/claude-skills/hot", tags:["发现平台","热度排序"] },
    ];

    // ========== STATE ==========
    var activeCat = "all";
    var searchQuery = "";

    // ========== SVG Icons ==========
    var icons = {
      flame: '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 23c-3.866 0-7-3.134-7-7 0-2.692 1.3-5.086 4-6.686V6c0-.55.45-1 1-1 .32 0 .6.15.78.39C12.5 7.5 14 9 14 11c1.5-1 2.5-3 2.5-5 0-.55.45-1 1-1 .32 0 .6.15.78.39C20.5 8.5 21 11.5 21 14c0 4.97-4.03 9-9 9z"/></svg>',
      externalLink: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
      star: '<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
      searchBig: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="48" height="48"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>',
    };

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== RENDER ==========
    function renderCategories() {
      var container = document.getElementById('categoryScroll');
      container.innerHTML = categories.map(function(c) {
        return '<button class="cat-btn ' + (c.id === activeCat ? 'active' : '') + '" data-cat="' + c.id + '">' + c.icon + ' ' + c.label + '</button>';
      }).join('');

      container.querySelectorAll('.cat-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          activeCat = btn.dataset.cat;
          renderCategories();
          renderCards();
        });
      });
    }

    function getFiltered() {
      var result = skills;
      if (activeCat !== 'all') result = result.filter(function(s) { return s.cat === activeCat; });
      if (searchQuery.trim()) {
        var q = searchQuery.toLowerCase();
        result = result.filter(function(s) {
          return s.name.toLowerCase().indexOf(q) !== -1 ||
            s.desc.toLowerCase().indexOf(q) !== -1 ||
            s.tags.some(function(t) { return t.toLowerCase().indexOf(q) !== -1; });
        });
      }
      return result;
    }

    function renderCards() {
      var filtered = getFiltered();
      var container = document.getElementById('cardsContainer');
      var countEl = document.getElementById('listCount');

      countEl.innerHTML = '共 <strong>' + filtered.length + '</strong> 个项目';

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">' + icons.searchBig +
          '<p>' + (searchQuery ? '未找到与 "' + escapeHtml(searchQuery) + '" 相关的项目' : '该分类暂无项目') + '</p></div>';
        return;
      }

      container.innerHTML = filtered.map(function(s, i) {
        var shortName = s.name.indexOf('/') !== -1 ? s.name.split('/').pop() : s.name;
        var isTop3 = i < 3;
        var tagsHtml = s.tags.slice(0, 3).map(function(t) {
          return '<span class="card-tag">' + escapeHtml(t) + '</span>';
        }).join('');

        return '<a href="' + s.url + '" target="_blank" rel="noopener noreferrer" class="skill-card" style="animation-delay:' + (i * 50) + 'ms">' +
          '<div class="card-top">' +
            '<div class="card-top-left">' +
              '<span class="card-rank ' + (isTop3 ? 'top3' : '') + '">' + (i + 1) + '</span>' +
              '<span class="card-name">' + escapeHtml(shortName) + '</span>' +
              (s.hot ? '<span class="card-hot">' + icons.flame + '</span>' : '') +
            '</div>' +
            '<span class="card-link-icon">' + icons.externalLink + '</span>' +
          '</div>' +
          '<div class="card-fullname">' + escapeHtml(s.name) + '</div>' +
          '<div class="card-desc">' + escapeHtml(s.desc) + '</div>' +
          '<div class="card-footer">' +
            '<div class="card-tags">' + tagsHtml + '</div>' +
            '<div class="card-stars">' + icons.star + '<span>' + s.stars + '</span></div>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    // ========== SEARCH ==========
    var searchInput = document.getElementById('searchInput');
    var searchClear = document.getElementById('searchClear');

    searchInput.addEventListener('input', function(e) {
      searchQuery = e.target.value;
      searchClear.classList.toggle('visible', searchQuery.length > 0);
      renderCards();
    });

    function clearSearch() {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('visible');
      renderCards();
    }

    // ========== BACK TO TOP ==========
    var backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
      backToTop.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });

    // ========== INIT ==========
    renderCategories();
    renderCards();
  </script>
</body>
</html>
