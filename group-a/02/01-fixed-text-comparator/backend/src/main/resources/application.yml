spring:
  redis:
    # ==========================================
    # 在线 Redis 服务配置（推荐用于开发/测试）
    # ==========================================
    # 选项1: Redis Cloud (https://redis.com/try-free/)
    # 免费额度: 30MB, 无需密码或默认密码
    # host: redis-12345.c1.us-east-1-2.ec2.redns.redis-cloud.com
    # port: 12345
    # password: your_password
    
    # 选项2: Upstash (https://upstash.com/)
    # 免费额度: 10000命令/天, REST API 兼容
    # host: your-redis.upstash.io
    # port: 6379
    # password: your_password
    
    # 选项3: Aiven (https://aiven.io/redis)
    # 免费试用: 1个CPU, 1GB内存
    # host: your-redis.aivencloud.com
    # port: 12345
    # password: your_password
    
    # 选项4: 本地 Redis（默认配置）
    host: localhost
    port: 6379
    password: 
    
    # 通用配置
    database: 0
    timeout: 5000
    ssl:
      enabled: false  # 如果在线服务要求SSL，改为 true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  config-dir: configs

logging:
  level:
    com.comparator: DEBUG
    org.springframework.data.redis: INFO
